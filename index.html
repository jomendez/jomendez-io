<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F6F4EF" />
    <title>Jomendez Inc — Smart websites & AI-powered sales systems for local businesses.</title>
    <meta
      name="description"
      content="Smart websites and AI-powered sales systems for local businesses. I build the website, CRM, booking, AI chat, and automated follow-up that helps you capture, follow up with, and convert more leads."
    />
    <link rel="canonical" href="https://jomendez.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jomendez Inc" />
    <meta property="og:title" content="Jomendez Inc — Smart websites & AI-powered sales systems for local businesses." />
    <meta
      property="og:description"
      content="Website, CRM, booking, AI chat, and automated follow-up working together as one system — so every lead gets captured, every inquiry gets a fast response, and nothing falls through the cracks."
    />
    <meta property="og:url" content="https://jomendez.io/" />
    <meta property="og:image" content="https://jomendez.io/landing/images/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Jomendez Inc — Smart websites and AI-powered sales systems for local businesses. Book a strategy call." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jomendez Inc — Smart websites & AI-powered sales systems for local businesses." />
    <meta
      name="twitter:description"
      content="Website, CRM, booking, AI chat, and automated follow-up working together as one system — so every lead gets captured and nothing falls through the cracks."
    />
    <meta name="twitter:image" content="https://jomendez.io/landing/images/og.png" />
    <meta name="twitter:image:alt" content="Jomendez Inc — Smart websites and AI-powered sales systems for local businesses. Book a strategy call." />

    <!-- Preconnect to font origins so the handshake overlaps app JS parse -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Hero LCP image preload — the founder portrait is the largest above-the-fold
         element on the new homepage, so we hint the browser to start fetching it
         in parallel with the JS bundle. -->
    <link rel="preload" as="image" href="/landing/images/hero_portrait.webp" type="image/webp" fetchpriority="high" />

    <!-- Schema.org Organization markup. The same JSON-LD is also injected
         from Landing.jsx so it travels with client navigations. Having it
         here gives crawlers the data on first paint. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Jomendez Inc",
        "url": "https://jomendez.io",
        "description": "Jomendez Inc builds smart websites and AI-powered sales systems — website, CRM, booking, AI chat, and automated follow-up — that help local businesses capture, follow up with, and convert more leads. Founded by Jose Mendez.",
        "founder": {
          "@type": "Person",
          "name": "Jose Mendez",
          "jobTitle": "Founder",
          "sameAs": [
            "https://www.linkedin.com/in/jomendez/",
            "https://github.com/jomendez"
          ]
        },
        "sameAs": [
          "https://www.linkedin.com/in/jomendez/",
          "https://github.com/jomendez"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- GoHighLevel Chat Widget -->
    <script src="https://widgets.leadconnectorhq.com/loader.js"
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js"
      data-widget-id="69fd75f84c428b0354541b2c"
      data-source="WEB_USER"></script>
  </body>
</html>
