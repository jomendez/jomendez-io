<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Open Graph share card for jomendez.io. 1200×630 is the size LinkedIn,
    Facebook, X, and iMessage all expect. The PNG render of this SVG is
    what the meta tags actually point at; this file is the source.
    Brand system: warm bg, ink text, accent blue, italic-serif emphasis.
  -->

  <defs>
    <!-- Faint blueprint grid so the card has the same texture as the page. -->
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(11,13,16,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F6F4EF"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top-left wordmark: dot + JOMENDEZ / INC -->
  <g transform="translate(80, 100)">
    <rect x="0" y="-12" width="14" height="14" fill="#3452FF" rx="2"/>
    <text x="26" y="0" font-family="Poppins, Lato, sans-serif" font-size="18"
          font-weight="500" letter-spacing="3" fill="#0B0D10">JOMENDEZ&#160;&#160;/&#160;&#160;INC</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 200)">
    <line x1="0" y1="-6" x2="32" y2="-6" stroke="#3452FF" stroke-width="1.5"/>
    <text x="44" y="0" font-family="Poppins, Lato, sans-serif" font-size="16"
          font-weight="500" letter-spacing="2" fill="#3452FF">— THE 8-POINT BUSINESS AUDIT</text>
  </g>

  <!-- Main headline. Three lines:
       Line 1: "Big-company technology,"  (Poppins SemiBold)
       Line 2: "built for your"           (Poppins SemiBold)
       Line 3: "small business."          (Lora italic — accent serif)
       Sized so the longest line ends comfortably before the radar. -->
  <g transform="translate(80, 270)">
    <text x="0" y="0" font-family="Poppins, Lato, sans-serif"
          font-size="68" font-weight="600" fill="#0B0D10"
          letter-spacing="-1.5">Big-company technology,</text>
    <text x="0" y="84" font-family="Poppins, Lato, sans-serif"
          font-size="68" font-weight="600" fill="#0B0D10"
          letter-spacing="-1.5">built for your</text>
    <text x="0" y="172" font-family="Lora, 'DejaVu Serif', serif"
          font-size="84" font-style="italic" font-weight="400" fill="#3452FF"
          letter-spacing="-2">small business.</text>
  </g>

  <!-- Bottom strip: tagline + accent URL -->
  <g transform="translate(80, 555)">
    <text x="0" y="0" font-family="Poppins, Lato, sans-serif" font-size="22"
          font-weight="400" fill="#5A5D66">Join the waitlist for The 8-Point Business Audit.</text>
  </g>

  <g transform="translate(80, 588)">
    <text x="0" y="0" font-family="'DejaVu Sans Mono', 'Liberation Mono', monospace"
          font-size="14" font-weight="500" letter-spacing="3" fill="#3452FF">JOMENDEZ.IO</text>
  </g>

  <!-- Right side: a decorative radar mark, 8 axes + score polygon.
       Centered at (1000, 305), radius 160. Same design language as the
       audit-section radar, scaled down and stripped of labels.
       Sized + positioned to give the headline clean breathing room. -->
  <g transform="translate(1000, 305) scale(0.89)">
    <!-- Concentric octagonal rings (4 rings) -->
    <g fill="none" stroke="rgba(11,13,16,0.18)" stroke-width="1">
      <polygon points="0,-45 31.82,-31.82 45,0 31.82,31.82 0,45 -31.82,31.82 -45,0 -31.82,-31.82"/>
      <polygon points="0,-90 63.64,-63.64 90,0 63.64,63.64 0,90 -63.64,63.64 -90,0 -63.64,-63.64"/>
      <polygon points="0,-135 95.46,-95.46 135,0 95.46,95.46 0,135 -95.46,95.46 -135,0 -95.46,-95.46"/>
      <polygon points="0,-180 127.28,-127.28 180,0 127.28,127.28 0,180 -127.28,127.28 -180,0 -127.28,-127.28"
               fill="rgba(52,82,255,0.05)"/>
    </g>

    <!-- 8 spokes -->
    <g stroke="rgba(11,13,16,0.18)" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-180"/>
      <line x1="0" y1="0" x2="127.28" y2="-127.28"/>
      <line x1="0" y1="0" x2="180" y2="0"/>
      <line x1="0" y1="0" x2="127.28" y2="127.28"/>
      <line x1="0" y1="0" x2="0" y2="180"/>
      <line x1="0" y1="0" x2="-127.28" y2="127.28"/>
      <line x1="0" y1="0" x2="-180" y2="0"/>
      <line x1="0" y1="0" x2="-127.28" y2="-127.28"/>
    </g>

    <!-- Score polygon — same illustrative pattern as the page radar,
         scaled to this size (scores: 62,48,36,72,52,66,58,44 / 100). -->
    <polygon points="0,-111.6 61.08,-61.08 64.8,0 91.62,91.62 0,93.6 -83.92,83.92 -104.4,0 -56.00,-56.00"
             fill="rgba(52,82,255,0.20)" stroke="#3452FF" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Score points -->
    <g fill="#3452FF">
      <circle cx="0" cy="-111.6" r="5"/>
      <circle cx="61.08" cy="-61.08" r="5"/>
      <circle cx="64.8" cy="0" r="5"/>
      <circle cx="91.62" cy="91.62" r="5"/>
      <circle cx="0" cy="93.6" r="5"/>
      <circle cx="-83.92" cy="83.92" r="5"/>
      <circle cx="-104.4" cy="0" r="5"/>
      <circle cx="-56.00" cy="-56.00" r="5"/>
    </g>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="rgba(11,13,16,0.4)"/>
  </g>

  <!-- Bottom-right: small "8 / POINTS" label anchoring the radar visually -->
  <g transform="translate(1120, 588)">
    <text x="0" y="0" text-anchor="end"
          font-family="'DejaVu Sans Mono', 'Liberation Mono', monospace"
          font-size="14" font-weight="500" letter-spacing="3"
          fill="rgba(11,13,16,0.5)">8 / DIMENSIONS</text>
  </g>

  <!-- Hairline border -->
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgba(11,13,16,0.08)" stroke-width="1"/>
</svg>
