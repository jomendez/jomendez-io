<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Brand Teal</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--c-paper); }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; }
  .sw { background:var(--c-paper); border:1px solid var(--c-grey-200); border-radius:8px; overflow:hidden; }
  .chip { height:64px; }
  .meta { padding:10px 12px; }
  .name { font-family:var(--f-display); font-size:15px; color:var(--c-grey-900); line-height:1.1; }
  .hex  { font-family:var(--f-body); font-size:11px; color:var(--c-grey-600); font-variant-numeric:tabular-nums; margin-top:2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#1F8088"></div><div class="meta"><div class="name">Teal Deep</div><div class="hex">#1F8088</div></div></div>
  <div class="sw"><div class="chip" style="background:#28A8B0"></div><div class="meta"><div class="name">Teal</div><div class="hex">#28A8B0 · brand</div></div></div>
  <div class="sw"><div class="chip" style="background:#48C8D0"></div><div class="meta"><div class="name">Teal Light</div><div class="hex">#48C8D0</div></div></div>
  <div class="sw"><div class="chip" style="background:#A8E0E4"></div><div class="meta"><div class="name">Teal Soft</div><div class="hex">#A8E0E4</div></div></div>
  <div class="sw"><div class="chip" style="background:#E4F4F5"></div><div class="meta"><div class="name">Teal Wash</div><div class="hex">#E4F4F5</div></div></div>
</div>
</body></html>
