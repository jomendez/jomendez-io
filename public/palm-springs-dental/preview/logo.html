<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--c-paper); display:grid; grid-template-columns:1.5fr 1fr; min-height:200px; }
  .pane { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; padding:24px; }
  .alt  { background:var(--c-grey-50); border-left:1px solid var(--c-grey-200); }
  .lbl  { font-family:var(--f-body); font-size:11px; color:var(--c-grey-600); letter-spacing:.06em; text-transform:uppercase; }
  .logo { height:80px; }
  .mark { height:80px; }
</style>
</head>
<body>
  <div class="pane"><img class="logo" src="../assets/logo-full.png" alt="Palm Springs Dental"><div class="lbl">Wordmark · primary lockup</div></div>
  <div class="pane alt"><img class="mark" src="../assets/mark.png" alt="Palm Springs Dental mark"><div class="lbl">Mark · standalone</div></div>
</body></html>
