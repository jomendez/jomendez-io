<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Warm Grey</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--c-paper); }
  .row { display:grid; grid-template-columns: repeat(8, 1fr); gap:8px; }
  .sw { background:var(--c-paper); border:1px solid var(--c-grey-200); border-radius:6px; overflow:hidden; }
  .chip { height:54px; }
  .meta { padding:8px 10px; }
  .name { font-family:var(--f-display); font-size:13px; color:var(--c-grey-900); line-height:1.1; }
  .hex  { font-family:var(--f-body); font-size:10px; color:var(--c-grey-600); font-variant-numeric:tabular-nums; margin-top:2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#2E2E33"></div><div class="meta"><div class="name">900</div><div class="hex">#2E2E33</div></div></div>
  <div class="sw"><div class="chip" style="background:#4A4A52"></div><div class="meta"><div class="name">700</div><div class="hex">#4A4A52</div></div></div>
  <div class="sw"><div class="chip" style="background:#707078"></div><div class="meta"><div class="name">600 ·  brand</div><div class="hex">#707078</div></div></div>
  <div class="sw"><div class="chip" style="background:#A0A0A8"></div><div class="meta"><div class="name">400</div><div class="hex">#A0A0A8</div></div></div>
  <div class="sw"><div class="chip" style="background:#C8C8CE"></div><div class="meta"><div class="name">300</div><div class="hex">#C8C8CE</div></div></div>
  <div class="sw"><div class="chip" style="background:#E2E2E6"></div><div class="meta"><div class="name">200</div><div class="hex">#E2E2E6</div></div></div>
  <div class="sw"><div class="chip" style="background:#F1F1F3"></div><div class="meta"><div class="name">100</div><div class="hex">#F1F1F3</div></div></div>
  <div class="sw"><div class="chip" style="background:#F8F8FA"></div><div class="meta"><div class="name">50</div><div class="hex">#F8F8FA</div></div></div>
</div>
</body></html>
