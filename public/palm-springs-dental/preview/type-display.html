<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Display & Headlines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px 32px; background:var(--c-paper); }
  .row { display:flex; align-items:baseline; gap:18px; padding:8px 0; border-bottom:1px solid var(--c-grey-200); }
  .row:last-child { border:0; }
  .meta { font-family:var(--f-body); font-size:11px; color:var(--c-grey-600); width:140px; flex-shrink:0; letter-spacing:.04em; text-transform:uppercase; }
  .specimen { font-family:var(--f-display); font-weight:400; color:var(--c-grey-900); letter-spacing:-0.02em; line-height:1; font-variation-settings:'opsz' 144; }
</style>
</head>
<body>
  <div class="row"><div class="meta">Display · 72 / 1.02</div><div class="specimen" style="font-size:54px">Comfortable care</div></div>
  <div class="row"><div class="meta">H1 · 56 / 1.05</div><div class="specimen" style="font-size:42px">Section title</div></div>
  <div class="row"><div class="meta">H2 · 40 / 1.10</div><div class="specimen" style="font-size:32px">Sub-section</div></div>
</body></html>
