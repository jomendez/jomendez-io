<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Bilingual headline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background:var(--c-paper); }
  .h { font-family:var(--f-display); font-size:46px; line-height:1.05; font-weight:400; letter-spacing:-0.02em; color:var(--c-grey-900); font-variation-settings:'opsz' 144; }
  .es { display:block; font-family:var(--f-display); font-style:italic; font-size:0.55em; color:var(--c-teal); margin-top:.4em; font-variation-settings:'opsz' 144,'SOFT' 100,'WONK' 1; letter-spacing:0; }
  .lbl { font-family:var(--f-body); font-size:11px; color:var(--c-grey-600); letter-spacing:.06em; text-transform:uppercase; margin-top:18px; }
</style>
</head>
<body>
  <h1 class="h">Comfortable dental care<em class="es">Cuidado dental con confianza</em></h1>
  <div class="lbl">English leads · Spanish follows in italic Fraunces · 0.55em · brand teal</div>
</body></html>
