<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Offer card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--c-paper); display:flex; justify-content:center; }
  .offer { background:var(--c-cream); border:1px solid var(--c-grey-200); border-radius:8px; padding:28px 32px; max-width:520px; width:100%; }
  .tag { display:inline-block; font-family:var(--f-body); font-size:12px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; color:var(--c-teal); padding:5px 12px; border:1px solid var(--c-teal); border-radius:999px; margin-bottom:16px; }
  h3 { font-family:var(--f-display); font-size:24px; font-weight:500; color:var(--c-grey-900); margin:0 0 4px; letter-spacing:-0.01em; }
  .es { font-family:var(--f-display); font-style:italic; font-size:15px; color:var(--c-teal); display:block; margin-bottom:18px; }
  .price { font-family:var(--f-display); font-size:40px; color:var(--c-grey-900); font-variant-numeric:tabular-nums; line-height:1; margin:6px 0 18px; }
  .price small { font-family:var(--f-body); font-size:13px; color:var(--c-grey-600); margin-left:8px; vertical-align:middle; }
  ul { list-style:none; margin:0 0 22px; padding:0; display:flex; flex-direction:column; gap:8px; }
  li { display:flex; align-items:center; gap:10px; font-family:var(--f-body); font-size:14px; color:var(--c-grey-700); }
  li svg { width:16px; height:16px; color:var(--c-success); flex-shrink:0; }
  .btn { display:inline-flex; align-items:center; gap:8px; background:var(--c-teal); color:#fff; padding:13px 26px; border-radius:999px; font-family:var(--f-body); font-weight:500; font-size:14px; box-shadow:var(--shadow-cta); border:none; cursor:pointer; }
</style>
</head>
<body>
<div class="offer">
  <span class="tag">New patient</span>
  <h3>New patient exam<em class="es">Examen para pacientes nuevos</em></h3>
  <div class="price">$129<small>· includes x-rays &amp; cleaning</small></div>
  <ul>
    <li><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19l12-12-1.4-1.4z"/></svg>Comprehensive exam &amp; screening</li>
    <li><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19l12-12-1.4-1.4z"/></svg>Full digital x-rays</li>
    <li><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19l12-12-1.4-1.4z"/></svg>Bilingual treatment plan</li>
  </ul>
  <button class="btn">Book today →</button>
</div>
</body></html>
