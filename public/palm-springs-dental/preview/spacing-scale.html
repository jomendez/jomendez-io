<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--c-paper); font-family:var(--f-body); }
  .row { display:flex; align-items:center; gap:16px; padding:6px 0; }
  .bar { background:var(--c-teal); height:14px; border-radius:3px; }
  .meta { font-size:12px; color:var(--c-grey-600); width:120px; font-variant-numeric:tabular-nums; }
  .name { font-family:var(--f-display); font-size:14px; color:var(--c-grey-900); width:50px; }
</style>
</head>
<body>
  <div class="row"><div class="name">s-1</div><div class="bar" style="width:4px"></div><div class="meta">4px</div></div>
  <div class="row"><div class="name">s-2</div><div class="bar" style="width:8px"></div><div class="meta">8px</div></div>
  <div class="row"><div class="name">s-3</div><div class="bar" style="width:12px"></div><div class="meta">12px</div></div>
  <div class="row"><div class="name">s-4</div><div class="bar" style="width:16px"></div><div class="meta">16px</div></div>
  <div class="row"><div class="name">s-5</div><div class="bar" style="width:24px"></div><div class="meta">24px</div></div>
  <div class="row"><div class="name">s-6</div><div class="bar" style="width:32px"></div><div class="meta">32px</div></div>
  <div class="row"><div class="name">s-8</div><div class="bar" style="width:48px"></div><div class="meta">48px</div></div>
  <div class="row"><div class="name">s-10</div><div class="bar" style="width:64px"></div><div class="meta">64px</div></div>
  <div class="row"><div class="name">s-12</div><div class="bar" style="width:96px"></div><div class="meta">96px</div></div>
</body></html>
