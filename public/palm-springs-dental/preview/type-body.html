<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Body Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px 32px; background:var(--c-paper); }
  .row { display:flex; align-items:baseline; gap:18px; padding:7px 0; border-bottom:1px solid var(--c-grey-200); }
  .row:last-child { border:0; }
  .meta { font-family:var(--f-body); font-size:11px; color:var(--c-grey-600); width:160px; flex-shrink:0; letter-spacing:.04em; text-transform:uppercase; }
  .specimen { color:var(--c-grey-900); }
  .display { font-family:var(--f-display); font-weight:500; color:var(--c-grey-900); }
  .body { font-family:var(--f-body); }
</style>
</head>
<body>
  <div class="row"><div class="meta">H3 · 28 · Fraunces 500</div><div class="specimen display" style="font-size:24px">Sub-section heading</div></div>
  <div class="row"><div class="meta">H4 · 22 · Fraunces 500</div><div class="specimen display" style="font-size:20px">Card title</div></div>
  <div class="row"><div class="meta">Lead · 20 · Inter 400</div><div class="specimen body" style="font-size:18px;color:var(--c-grey-700)">Intro paragraph copy</div></div>
  <div class="row"><div class="meta">Body · 17 · Inter 400</div><div class="specimen body" style="font-size:16px">Default paragraph text reads here.</div></div>
  <div class="row"><div class="meta">Small · 15 / Micro · 13</div><div class="specimen body" style="font-size:14px">Captions, meta · <span style="font-size:12px;font-weight:500;letter-spacing:.02em;color:var(--c-grey-600)">LABELS &amp; TAGS</span></div></div>
</body></html>
