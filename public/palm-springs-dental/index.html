@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,30..100,0..1;1,9..144,300..700,30..100,0..1&family=Inter+Tight:wght@400;500;600;700&display=swap');

:root {

  --c-cream:       #FBFBFD;

  --accent-hover:  var(--c-teal-deep);
  --accent-wash:   var(--c-teal-wash);
  --border:        var(--c-grey-200);
  --border-strong: var(--c-grey-600);
  --f-display: 'Fraunces', 'Cormorant Garamond', Georgia, serif;
  --f-body:    'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --f-mono:    ui-monospace, 'SF Mono', 'JetBrains Mono', monospace;
  --type-display: 4.5rem;
  --type-h1:      3.5rem;
  --type-h2:      2.5rem;
  --type-h3:      1.75rem;
  --type-h4:      1.375rem;
  --type-lead:    1.25rem;
  --type-body:    1.0625rem;
  --type-small:   0.9375rem;
  --type-micro:   0.8125rem;
  --lh-display: 1.02;
  --lh-h1:      1.05;
  --lh-h2:      1.10;
  --lh-h3:      1.20;
  --lh-h4:      1.30;
  --lh-body:    1.60;
  --lh-tight:   1.40;
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-8:  48px;
  --s-10: 64px;
  --s-12: 96px;
  --s-16: 128px;
  --s-20: 192px;
  --r-sm:   6px;
  --r-md:   8px;
  --r-lg:   16px;
  --r-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(46, 46, 51, 0.06);
  --shadow-md: 0 8px 24px -8px rgba(46, 46, 51, 0.14);
  --shadow-lg: 0 24px 48px -12px rgba(46, 46, 51, 0.20);
  --shadow-cta: 0 1px 0 rgba(40, 168, 176, 0.30), 0 8px 24px -8px rgba(40, 168, 176, 0.45);
  --shadow-cta-hover: 0 1px 0 rgba(40, 168, 176, 0.40), 0 12px 32px -8px rgba(40, 168, 176, 0.55);
  --ease-out:    cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --d-fast:      160ms;
  --d-base:      240ms;
  --d-slow:      480ms;
  --d-page:      720ms;
  --max-w:       1280px;
  --max-read:    680px;
}

html { color-scheme: light; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--f-body);
  font-size: var(--type-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
h1, h2, h3, h4, h5 {
  font-family: var(--f-display);
  font-weight: 400;
  color: var(--fg-display);
  font-variation-settings: 'opsz' 144;
  letter-spacing: -0.02em;
  margin: 0;
  text-wrap: balance;
}
h1 { font-size: var(--type-h1); line-height: var(--lh-h1); }
h2 { font-size: var(--type-h2); line-height: var(--lh-h2); }
h3 { font-size: var(--type-h3); line-height: var(--lh-h3); font-weight: 500; letter-spacing: -0.01em; }
h4 { font-size: var(--type-h4); line-height: var(--lh-h4); font-weight: 500; letter-spacing: 0; }
.lead { font-size: var(--type-lead); line-height: 1.5; color: var(--fg-soft); }
p { margin: 0 0 1em; max-width: var(--max-read); text-wrap: pretty; }
small, .small { font-size: var(--type-small); }
.tnum, .price, .tel { font-variant-numeric: tabular-nums; }
a {
  color: var(--c-teal);
  text-decoration-color: var(--c-teal-soft);
  text-underline-offset: 4px;
  text-decoration-thickness: 1.5px;
  transition: color var(--d-fast) var(--ease-out);
}
a:hover { color: var(--c-teal-deep); }
::selection { background: var(--c-teal-soft); color: var(--c-grey-900); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

  <style>
* { box-sizing: border-box; }
html, body { margin:0; padding:0; overflow-x: hidden; }

.psd-eyebrow {

.psd-es {
  display: block;

  font-style: italic;
  color: var(--c-grey-600);
  font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
  font-size: 0.55em;

  letter-spacing: 0;

}
.psd-es--sm { font-size: 14px; margin-top: 4px; }

  border-radius: 999px;
  border: none;

  transition: all 240ms cubic-bezier(.2,.8,.2,1);
}
.psd-btn--primary {

}
.psd-btn--primary:hover {

}
.psd-btn--secondary {

  border: 1.5px solid var(--c-teal-deep);

}
.psd-btn--secondary:hover { background: var(--c-teal-deep); color: var(--c-cream); }
.psd-btn--ghost-light {

}
.psd-btn--ghost-light:hover { background: rgba(255,255,255,.1); border-color: var(--c-cream); }

.psd-link-arrow {
  font-family: var(--f-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--c-teal-deep);
  text-decoration: underline;
  text-decoration-color: var(--c-teal-light);

}
.psd-link-arrow::after { content: " \2192"; display: inline-block; transition: transform 200ms; }

.psd-link-arrow:hover { color: var(--c-teal); }
.psd-link-arrow--light { color: var(--c-cream); text-decoration-color: var(--c-teal-light); }
.psd-link-arrow--light:hover { color: var(--c-teal-light); }

.psd-photo {
  background:

  overflow: hidden;
  isolation: isolate;
}
.psd-photo::after {
  content: "";

  opacity: .5;

}
.psd-photo__placeholder {

.psd-nav__utility {

.psd-hero__headline-es {

.psd-hero__lead {

.psd-section {

}
.psd-section__head { margin-bottom: 48px; max-width: 720px; }

.psd-booking-cta {
  background: var(--c-teal-deep);
  color: var(--c-cream);
  padding: 96px 48px;
  text-align: center;
}
.psd-booking-cta__head {
  font-family: var(--f-display);
  font-size: 48px;
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--c-cream);
  margin: 0 0 40px;
  font-variation-settings: 'opsz' 144;
  max-width: 760px;
  margin-left: auto; margin-right: auto;
  text-wrap: balance;
}
.psd-booking-cta__actions {
  display: flex; gap: 20px; justify-content: center; align-items: center; flex-wrap: wrap;
}

.psd-footer {
  background: var(--c-cream);
  border-top: 1px solid var(--c-grey-200);
  padding: 96px 48px 32px;
}
.psd-footer__top {
  max-width: var(--max-w); margin: 0 auto;
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 64px;
  margin-bottom: 64px;
}
.psd-footer__brand img { height: 68px; margin-bottom: 16px; }
.psd-footer__brand p { font-size: 15px; color: var(--c-grey-700); max-width: 320px; }
.psd-footer__lbl {
  font-family: var(--f-body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--c-grey-600);
  margin-bottom: 12px;
}
.psd-footer__col p, .psd-footer__addr {
  font-size: 15px; color: var(--c-teal-deep); line-height: 1.6; margin: 0;
}
.psd-footer__col a { color: var(--c-teal-deep); text-decoration: none; }
.psd-footer__col a:hover { color: var(--c-teal); }
.psd-footer__bottom {
  max-width: var(--max-w); margin: 0 auto;
  border-top: 1px solid var(--c-grey-200);
  padding-top: 24px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--f-body);
  font-size: 13px;
  color: var(--c-grey-600);
}
.psd-footer__bottom em {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 15px;
  color: var(--c-teal);
  font-variation-settings: 'SOFT' 100;
}
.psd-footer__lang { font-variant-numeric: tabular-nums; }

/* ---- Mobile hamburger button (hidden on desktop via display:none) ---- */
.psd-nav__hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 40px; height: 40px;
  padding: 8px;
  background: none; border: 0; cursor: pointer;
  z-index: 60;
}
.psd-nav__hamburger span {
  display: block; width: 100%; height: 2px;
  background: var(--c-teal-deep); border-radius: 2px;
  transition: transform .25s ease, opacity .2s ease;
}
.psd-nav__hamburger.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.psd-nav__hamburger.is-open span:nth-child(2) { opacity: 0; }
.psd-nav__hamburger.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ---- Mobile menu overlay ---- */
.psd-mobile-menu {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 55;
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(16px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 80px 32px 32px;
}
.psd-mobile-menu a {
  font-family: var(--f-display);
  font-size: 24px;
  color: var(--c-teal-deep);
  text-decoration: none;
  padding: 16px 0;
  width: 100%;
  text-align: center;
  border-bottom: 1px solid var(--c-grey-200);
}
.psd-mobile-menu a:last-child { border-bottom: 0; }
.psd-mobile-menu a:hover { color: var(--c-teal); }
.psd-mobile-menu .psd-btn {
  margin-top: 20px;
  width: 100%;
  justify-content: center;
  padding: 16px 28px;
  font-size: 16px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */

/* ---- Tablet (960px) ---- */
@media (max-width: 960px) {
  /* Nav: hide desktop links, show hamburger to the left of logo */
  .psd-nav__utility { display: none; }
  .psd-nav__links { display: none; }
  .psd-nav__cta { display: none; }
  .psd-nav__hamburger { display: flex; }
  .psd-mobile-menu.is-open { display: flex; }
  .psd-nav__main {
    grid-template-columns: auto 1fr;
    gap: 12px;
    padding: 12px 20px;
  }
  .psd-nav__logo img { height: 48px; }

  /* Grids to single column */
  .psd-hero { grid-template-columns: 1fr; gap: 32px; padding: 48px 24px 56px; }
  .psd-hero__visual .psd-photo { margin-right: 0; height: auto; aspect-ratio: 16/9; border-radius: 12px; }
  .psd-hero__visual { overflow: hidden; }
  .psd-photo--hero { aspect-ratio: 16/9; }

  .psd-doctor { grid-template-columns: 1fr; gap: 36px; }
  .psd-doctor__photo { max-width: 400px; margin: 0 auto; border-radius: 12px; }

  .psd-offer-band { grid-template-columns: 1fr; gap: 36px; padding: 56px 24px; }

  .psd-footer__top { grid-template-columns: 1fr 1fr; gap: 36px; }

  .psd-service-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .psd-promise__grid { grid-template-columns: 1fr; gap: 32px; }

  .psd-section { padding: 56px 24px; }
  .psd-promise { padding: 56px 24px; }
  .psd-promise__head { font-size: 32px; margin-bottom: 40px; }
  .psd-booking-cta { padding: 56px 24px; }
  .psd-booking-cta__head { font-size: 32px; }
  .psd-insurance { padding: 48px 24px; }
  .psd-footer { padding: 56px 24px 24px; }

  .psd-section__head h2 { font-size: 32px; }
  .psd-doctor__copy h2 { font-size: 28px; }
  .psd-quote { font-size: 19px; }

  .psd-review-card { padding: 40px 32px; }
  .psd-review-card p { font-size: 22px; }

  .psd-offer-band__copy h2 { font-size: 30px; }
  .psd-offer-card__price { font-size: 48px; }
}

/* ---- Mobile (480px) ---- */
@media (max-width: 480px) {
  .psd-nav__main { padding: 10px 16px; gap: 10px; }
  .psd-nav__logo img { height: 40px; }

  .psd-hero { padding: 32px 16px 40px; gap: 24px; }
  .psd-hero__headline { font-size: clamp(32px, 9vw, 48px); margin-bottom: 14px; }
  .psd-hero__headline-es { font-size: 0.45em; margin-top: 8px; }
  .psd-hero__lead { font-size: 15px; line-height: 1.55; margin-bottom: 24px; max-width: none; }
  .psd-hero__ctas { flex-direction: column; gap: 10px; }
  .psd-hero__ctas .psd-btn { width: 100%; justify-content: center; }
  .psd-hero__trust { font-size: 13px; gap: 8px; }
  .psd-hero__visual .psd-photo { aspect-ratio: 4/3; border-radius: 10px; }
  .psd-photo--hero { aspect-ratio: 4/3; }

  .psd-section { padding: 40px 16px; }
  .psd-section__head { margin-bottom: 24px; }
  .psd-section__head h2 { font-size: 26px; }

  .psd-service-grid { grid-template-columns: 1fr; gap: 12px; }
  .psd-service-card { padding: 20px; border-radius: 10px; }
  .psd-service-card h4 { font-size: 19px; margin-bottom: 10px; }
  .psd-service-card__icon { margin-bottom: 12px; }

  .psd-promise { padding: 40px 16px; }
  .psd-promise__head { font-size: 26px; margin-bottom: 28px; }
  .psd-pillar__title { font-size: 20px; }
  .psd-pillar__es { font-size: 14px; }
  .psd-pillar p { font-size: 14px; }

  .psd-doctor { gap: 28px; }
  .psd-doctor__photo { max-width: 320px; }
  .psd-doctor__copy h2 { font-size: 24px; }
  .psd-doctor__creds { font-size: 10px; margin-bottom: 16px; }
  .psd-quote { font-size: 17px; max-width: none; }
  .psd-quote-es { font-size: 13px; max-width: none; }

  .psd-review-card { padding: 28px 20px; border-radius: 12px; }
  .psd-review-card__quote { font-size: 56px; top: 8px; left: 12px; }
  .psd-review-card p { font-size: 18px; }
  .psd-review-card footer { font-size: 11px; }

  .psd-offer-band { padding: 40px 16px; gap: 28px; }
  .psd-offer-band__copy h2 { font-size: 26px; }
  .psd-offer-band__copy p { font-size: 15px; }
  .psd-offer-card { padding: 24px; border-radius: 10px; }
  .psd-offer-card__price { font-size: 40px; }
  .psd-offer-card__list li { font-size: 14px; gap: 10px; }

  .psd-insurance { padding: 32px 16px; }
  .psd-insurance__lbl { font-size: 10px; margin-bottom: 20px; }
  .psd-insurance__row { gap: 16px 24px; }
  .psd-insurance__chip { font-size: 15px; }

  .psd-booking-cta { padding: 40px 16px; }
  .psd-booking-cta__head { font-size: 24px; margin-bottom: 24px; }
  .psd-booking-cta__actions { flex-direction: column; gap: 12px; }
  .psd-booking-cta__actions .psd-btn,
  .psd-booking-cta__actions .psd-link-arrow { width: 100%; text-align: center; justify-content: center; display: flex; }

  .psd-footer { padding: 40px 16px 20px; }
  .psd-footer__top { grid-template-columns: 1fr; gap: 28px; margin-bottom: 32px; }
  .psd-footer__brand img { height: 40px; }
  .psd-footer__brand p { font-size: 14px; }
  .psd-footer__col p, .psd-footer__addr { font-size: 14px; }
  .psd-footer__bottom {
    flex-direction: column; gap: 6px; align-items: flex-start;
    font-size: 12px; padding-top: 16px;
  }
  .psd-footer__bottom em { font-size: 13px; }
}

/* ============================================================
   MOCKED WIDGETS — booking modal, hero slots, sticky bar,
   chat, social-proof toasts. All shells, no backends.
   ============================================================ */

.psd-btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

/* ---- Booking modal ---- */
.psd-modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(46, 46, 51, 0.55);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: psdFadeIn 220ms var(--ease-out);
}
@keyframes psdFadeIn { from { opacity: 0; } to { opacity: 1; } }
.psd-modal {
  background: var(--c-paper);
  border-radius: 16px;
  max-width: 560px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 40px;
  position: relative;
  box-shadow: var(--shadow-lg);
  animation: psdSlideUp 320ms var(--ease-out);
}
@keyframes psdSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.psd-modal__close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none;
  width: 32px; height: 32px;
  border-radius: 999px;
  cursor: pointer;
  color: var(--c-grey-600);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--d-fast) var(--ease-out);
}
.psd-modal__close:hover { background: var(--c-grey-100); color: var(--c-grey-900); }
.psd-modal__steps {
  display: flex; gap: 8px;
  margin-bottom: 28px;
  padding-right: 36px;
}
.psd-modal__step {
  flex: 1; height: 4px;
  background: var(--c-grey-200);
  border-radius: 999px;
  transition: background var(--d-base) var(--ease-out);
}
.psd-modal__step.is-active { background: var(--c-teal); }
.psd-modal__step.is-done { background: var(--c-teal-deep); }
.psd-modal h3 {
  font-family: var(--f-display);
  font-size: 28px;
  font-weight: 500;
  color: var(--c-teal-deep);
  margin: 0 0 8px;
  letter-spacing: -0.01em;
}
.psd-modal__sub {
  color: var(--c-grey-600);
  font-size: 14px;
  margin: 0 0 22px;
  max-width: none;
}

.psd-svc-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.psd-svc-option {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--c-paper);
  border: 1px solid var(--c-grey-200);
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  font: inherit;
  font-size: 14px;
  color: var(--c-grey-900);
  transition: all var(--d-fast) var(--ease-out);
}
.psd-svc-option:hover { border-color: var(--c-teal); background: var(--c-teal-wash); }
.psd-svc-option.is-selected {
  border-color: var(--c-teal);
  background: var(--c-teal-wash);
  box-shadow: 0 0 0 3px rgba(40, 168, 176, 0.15);
}
.psd-svc-option svg { width: 18px; height: 18px; color: var(--c-teal-deep); flex-shrink: 0; }

.psd-day { margin-bottom: 16px; }
.psd-day:last-child { margin-bottom: 0; }
.psd-day__label {
  font-family: var(--f-body);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--c-grey-600);
  margin-bottom: 8px;
}
.psd-slots { display: flex; flex-wrap: wrap; gap: 8px; }
.psd-slot {
  padding: 8px 14px;
  background: var(--c-paper);
  border: 1px solid var(--c-grey-200);
  border-radius: 999px;
  font: inherit;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--c-teal-deep);
  cursor: pointer;
  transition: all var(--d-fast) var(--ease-out);
}
.psd-slot:hover:not(:disabled) { border-color: var(--c-teal); background: var(--c-teal-wash); }
.psd-slot.is-selected {
  background: var(--c-teal);
  color: var(--c-cream);
  border-color: var(--c-teal);
}
.psd-slot:disabled {
  color: var(--c-grey-400);
  cursor: not-allowed;
  text-decoration: line-through;
  text-decoration-color: var(--c-grey-300);
}

.psd-field { margin-bottom: 14px; }
.psd-field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--c-grey-700);
  margin-bottom: 6px;
}
.psd-field input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--c-grey-300);
  border-radius: 8px;
  font: inherit;
  font-size: 15px;
  color: var(--c-grey-900);
  background: var(--c-paper);
  transition: all var(--d-fast) var(--ease-out);
}
.psd-field input:focus {
  outline: none;
  border-color: var(--c-teal);
  box-shadow: 0 0 0 3px rgba(40, 168, 176, 0.15);
}

.psd-summary {
  background: var(--c-teal-wash);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 20px;
}
.psd-summary__row {
  display: flex; justify-content: space-between;
  font-size: 14px;
  padding: 4px 0;
  gap: 16px;
}
.psd-summary__row span:first-child { color: var(--c-grey-600); flex-shrink: 0; }
.psd-summary__row span:last-child { color: var(--c-teal-deep); font-weight: 500; text-align: right; }

.psd-confirm { text-align: center; padding: 8px 0 0; }
.psd-confirm__icon {
  width: 64px; height: 64px;
  border-radius: 999px;
  background: var(--c-teal);
  color: var(--c-cream);
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
}
.psd-confirm h3 { margin-bottom: 12px; }
.psd-confirm p { color: var(--c-grey-700); margin: 0 auto 8px; max-width: 380px; }
.psd-confirm__details {
  background: var(--c-teal-wash);
  border-radius: 10px;
  padding: 16px 18px;
  margin: 24px 0;
  text-align: left;
}

.psd-modal__nav {
  display: flex; gap: 10px;
  margin-top: 24px;
}
.psd-modal__nav .psd-btn { flex: 1; justify-content: center; }

/* ---- Hero slot chips ---- */
.psd-hero__slots { margin: 28px 0 32px; }
.psd-hero__slots-lbl {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--f-body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--c-grey-600);
  margin-bottom: 12px;
}
.psd-hero__slots-lbl::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--c-success);
  border-radius: 999px;
  animation: psdPulse 2s infinite;
}
@keyframes psdPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(63, 157, 110, 0.45); }
  50% { box-shadow: 0 0 0 6px rgba(63, 157, 110, 0); }
}
.psd-hero__slots-row { display: flex; flex-wrap: wrap; gap: 8px; }
.psd-hero__slot {
  padding: 8px 14px;
  background: var(--c-paper);
  border: 1px solid var(--c-grey-300);
  border-radius: 999px;
  font: inherit;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  color: var(--c-teal-deep);
  cursor: pointer;
  transition: all var(--d-fast) var(--ease-out);
}
.psd-hero__slot:hover {
  border-color: var(--c-teal);
  background: var(--c-teal-wash);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

/* ---- Sticky mobile call/book bar ---- */
.psd-sticky-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 70;
  display: none;
  background: var(--c-paper);
  border-top: 1px solid var(--c-grey-200);
  padding: 10px 16px;
  gap: 10px;
  box-shadow: 0 -4px 24px -8px rgba(46, 46, 51, 0.18);
  transform: translateY(110%);
  transition: transform var(--d-base) var(--ease-out);
}
.psd-sticky-bar.is-visible { transform: translateY(0); }
.psd-sticky-bar .psd-btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; }
@media (max-width: 960px) {
  .psd-sticky-bar { display: flex; }
  body.has-sticky-bar { padding-bottom: 72px; }
}

/* ---- Chat widget ---- */
.psd-chat { position: fixed; bottom: 24px; right: 24px; z-index: 65; }
@media (max-width: 960px) {
  .psd-chat { bottom: 88px; right: 16px; }
}
.psd-chat__bubble {
  width: 60px; height: 60px;
  border-radius: 999px;
  background: var(--c-teal);
  color: var(--c-cream);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-cta);
  transition: all var(--d-base) var(--ease-out);
  position: relative;
}
.psd-chat__bubble:hover {
  background: var(--c-teal-deep);
  transform: translateY(-2px);
  box-shadow: var(--shadow-cta-hover);
}
.psd-chat__badge {
  position: absolute;
  top: -2px; right: -2px;
  min-width: 18px; height: 18px;
  background: var(--c-alert);
  color: var(--c-cream);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--c-paper);
  padding: 0 4px;
}
.psd-chat__panel {
  position: absolute;
  bottom: 76px; right: 0;
  width: 360px;
  max-width: calc(100vw - 32px);
  height: 480px;
  max-height: calc(100vh - 120px);
  background: var(--c-paper);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: psdSlideUp 280ms var(--ease-out);
}
.psd-chat__header {
  background: var(--c-teal-deep);
  color: var(--c-cream);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.psd-chat__avatar {
  width: 36px; height: 36px;
  border-radius: 999px;
  background: var(--c-teal-light);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--c-teal-deep);
  flex-shrink: 0;
}
.psd-chat__header-text { min-width: 0; }
.psd-chat__header h4 {
  font-family: var(--f-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--c-cream);
  margin: 0;
  letter-spacing: 0;
}
.psd-chat__header-meta {
  font-size: 11px;
  color: rgba(255,255,255,.7);
  display: flex; align-items: center; gap: 6px;
  margin-top: 2px;
}
.psd-chat__online-dot {
  width: 8px; height: 8px;
  background: var(--c-success);
  border-radius: 999px;
}
.psd-chat__close {
  margin-left: auto;
  background: none; border: none;
  color: var(--c-cream); cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--d-fast) var(--ease-out);
  flex-shrink: 0;
}
.psd-chat__close:hover { background: rgba(255,255,255,.15); }
.psd-chat__body {
  flex: 1; overflow-y: auto;
  padding: 16px;
  background: var(--c-grey-50);
  display: flex; flex-direction: column; gap: 8px;
}
.psd-chat__msg {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.45;
  animation: psdSlideUp 240ms var(--ease-out);
}
.psd-chat__msg--bot {

  <script type="text/babel">
/* global React, ReactDOM */
const { useState, useEffect } = React;

/* ============================================================
   MOCKED WIDGET COMPONENTS
   Booking modal, hero slots, sticky bar, chat, toasts.
   No backend — all interactions are scripted theater.
   ============================================================ */

const BookingContext = React.createContext(null);
function useBooking() { return React.useContext(BookingContext); }

const SERVICE_OPTIONS = [
  { id: 'newpatient', label: 'New patient exam' },
  { id: 'cleaning',   label: 'Cleaning' },
  { id: 'emergency',  label: 'Emergency visit' },
  { id: 'invisalign', label: 'Invisalign consult' },
  { id: 'whitening',  label: 'Whitening' },
  { id: 'implants',   label: 'Implants consult' },
];

function buildDaysOfSlots() {
  const today = new Date();
  const out = [];
  let i = 0;
  while (out.length < 4 && i < 8) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dow = d.getDay();
    if (dow !== 0) {
      const longDate = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const label = i === 0 ? 'Today · ' + longDate
        : i === 1 ? 'Tomorrow · ' + longDate
        : d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      const slots = dow === 6
        ? [{ time: '9:00a', avail: true }, { time: '10:30a', avail: false }, { time: '12:00p', avail: true }, { time: '1:30p', avail: true }]
        : [
            { time: '8:30a',  avail: i > 0 },
            { time: '10:00a', avail: true },
            { time: '11:30a', avail: i % 2 === 1 },
            { time: '2:00p',  avail: true },
            { time: '3:30p',  avail: i % 2 === 0 },
            { time: '5:00p',  avail: true },
          ];
      out.push({ key: d.toISOString().slice(0,10), label, slots });
    }
    i++;
  }
  return out;
}

function BookingModal({ open, onClose, initialSlot }) {
  const [step, setStep] = useState(0);
  const [service, setService] = useState(null);
  const [slot, setSlot] = useState(null);
  const [name, setName] = useState('');
  const [phone, setPhone] = useState('');
  const days = React.useMemo(() => buildDaysOfSlots(), [open]);

  useEffect(() => {
    if (open) {
      document.body.style.overflow = 'hidden';
      setStep(0);
      setService(null);
      setSlot(initialSlot || null);
      setName('');
      setPhone('');
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [open, initialSlot]);

  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const canNext =
    (step === 0 && service) ||
    (step === 1 && slot) ||
    (step === 2 && name.trim() && phone.trim());

  const cleanDayLabel = (lbl) => (lbl || '').replace(/ · .*$/, '');

  return (
    <div className="psd-modal-backdrop" onClick={onClose}>
      <div className="psd-modal" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
        <button className="psd-modal__close" onClick={onClose} aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>

        {step < 3 && (
          <div className="psd-modal__steps">
            {[0,1,2].map(n => (
              <div key={n} className={'psd-modal__step' + (n < step ? ' is-done' : n === step ? ' is-active' : '')} />
            ))}
          </div>
        )}

        {step === 0 && (
          <>
            <h3>What brings you in?</h3>
            <p className="psd-modal__sub">Pick the visit type — we'll match you with the right provider.</p>
            <div className="psd-svc-options">
              {SERVICE_OPTIONS.map(s => (
                <button
                  key={s.id}
                  className={'psd-svc-option' + (service && service.id === s.id ? ' is-selected' : '')}
                  onClick={() => setService(s)}
                >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>
                  {s.label}
                </button>
              ))}
            </div>
          </>
        )}

        {step === 1 && (
          <>
            <h3>Pick a time</h3>
            <p className="psd-modal__sub">Live availability for {service.label.toLowerCase()}. Greyed slots are taken.</p>
            {days.map(d => (
              <div key={d.key} className="psd-day">
                <div className="psd-day__label">{d.label}</div>
                <div className="psd-slots">
                  {d.slots.map(s => (
                    <button
                      key={s.time}
                      className={'psd-slot' + (slot && slot.day === d.key && slot.time === s.time ? ' is-selected' : '')}
                      disabled={!s.avail}
                      onClick={() => setSlot({ day: d.key, dayLabel: d.label, time: s.time })}
                    >
                      {s.time}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </>
        )}

        {step === 2 && (
          <>
            <h3>Almost there</h3>
            <p className="psd-modal__sub">We'll text you to confirm — no spam, ever.</p>
            <div className="psd-summary">
              <div className="psd-summary__row"><span>Visit</span><span>{service.label}</span></div>
              <div className="psd-summary__row"><span>When</span><span>{cleanDayLabel(slot.dayLabel)} · {slot.time}</span></div>
            </div>
            <div className="psd-field">
              <label>Your name</label>
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="María Rodríguez" />
            </div>
            <div className="psd-field">
              <label>Phone number</label>
              <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="(305) 555-0117" />
            </div>
          </>
        )}

        {step === 3 && (
          <div className="psd-confirm">
            <div className="psd-confirm__icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <h3>You're booked!</h3>
            <p>We've reserved your slot. A team member will text {phone} shortly to confirm.</p>
            <div className="psd-confirm__details">
              <div className="psd-summary__row"><span>Visit</span><span>{service.label}</span></div>
              <div className="psd-summary__row"><span>When</span><span>{cleanDayLabel(slot.dayLabel)} · {slot.time}</span></div>
              <div className="psd-summary__row"><span>Name</span><span>{name}</span></div>
              <div className="psd-summary__row"><span>Phone</span><span>{phone}</span></div>
            </div>
            <button className="psd-btn psd-btn--primary" onClick={onClose}>Done</button>
          </div>
        )}

        {step < 3 && (
          <div className="psd-modal__nav">
            {step > 0 && <button className="psd-btn psd-btn--secondary" onClick={() => setStep(step - 1)}>Back</button>}
            <button
              className="psd-btn psd-btn--primary"
              disabled={!canNext}
              onClick={() => setStep(step + 1)}
            >
              {step === 2 ? 'Confirm booking' : 'Continue →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function BookingProvider({ children }) {
  const [open, setOpen] = useState(false);
  const [initialSlot, setInitialSlot] = useState(null);
  const openBooking = (slot = null) => { setInitialSlot(slot); setOpen(true); };
  const closeBooking = () => setOpen(false);
  return (
    <BookingContext.Provider value={{ openBooking, closeBooking }}>
      {children}
      <BookingModal open={open} onClose={closeBooking} initialSlot={initialSlot} />
    </BookingContext.Provider>
  );
}

function HeroSlots() {
  const { openBooking } = useBooking();
  const slots = React.useMemo(() => {
    const today = new Date();
    const times = ['10:00a', '2:30p', '9:00a', '4:00p', '11:00a'];
    const out = [];
    let i = 0, added = 0;
    while (added < 5 && i < 10) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      if (d.getDay() !== 0) {
        const day = d.toLocaleDateString('en-US', { weekday: 'short' });
        const label = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : day;
        const longLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        out.push({
          chip: label + ' ' + times[added],
          day: d.toISOString().slice(0, 10),
          dayLabel: longLabel,
          time: times[added],
        });
        added++;
      }
      i++;
    }
    return out;
  }, []);
  return (
    <div className="psd-hero__slots">
      <span className="psd-hero__slots-lbl">Next available · Updated live</span>
      <div className="psd-hero__slots-row">
        {slots.map(s => (
          <button
            key={s.day + s.time}
            className="psd-hero__slot"
            onClick={() => openBooking({ day: s.day, dayLabel: s.dayLabel, time: s.time })}
          >
            {s.chip}
          </button>
        ))}
      </div>
    </div>
  );
}

function StickyBar() {
  const [visible, setVisible] = useState(false);
  const { openBooking } = useBooking();
  useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > 500);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  useEffect(() => {
    document.body.classList.toggle('has-sticky-bar', visible);
    return () => document.body.classList.remove('has-sticky-bar');
  }, [visible]);
  return (
    <div className={'psd-sticky-bar' + (visible ? ' is-visible' : '')} role="region" aria-label="Quick actions">
      <a className="psd-btn psd-btn--secondary" href="tel:+13055550117">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
        Call
      </a>
      <button className="psd-btn psd-btn--primary" onClick={() => openBooking()}>Book today</button>
    </div>
  );
}

const CHAT_FLOW = [
  { id: 'emergency',  label: 'Emergency',     reply: "Oh no — call us at (305) 555-0117 and we'll get you in today. We hold same-day emergency slots open." },
  { id: 'newpatient', label: 'New patient',   reply: "Welcome! Our $129 new-patient visit includes exam, x-rays, and a written plan — bilingual, no pressure. Want me to find a slot this week?" },
  { id: 'invisalign', label: 'Invisalign',    reply: "Free Invisalign consult with a 3D smile preview. Most patients qualify for ~$89/mo financing. Want to book the consult?" },
  { id: 'cost',       label: 'Cost question', reply: "Totally fair — tell me the procedure and your insurance, and I'll come back with a real estimate, not a guess." },
];

function ChatWidget() {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [typing, setTyping] = useState(false);
  const [showChips, setShowChips] = useState(false);
  const [hasUnread, setHasUnread] = useState(true);
  const bodyRef = React.useRef(null);

  useEffect(() => {
    if (open) {
      setHasUnread(false);
      if (messages.length === 0) {
        setTyping(true);
        const t = setTimeout(() => {
          setTyping(false);
          setMessages([{ from: 'bot', text: "¡Hola! 👋 I'm Sofia from the front desk. What brings you in today?" }]);
          setShowChips(true);
        }, 1200);
        return () => clearTimeout(t);
      }
    }
  }, [open]);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, typing]);

  const handleChip = (chip) => {
    setMessages(m => [...m, { from: 'user', text: chip.label }]);
    setShowChips(false);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMessages(m => [...m, { from: 'bot', text: chip.reply }]);
      setTimeout(() => setShowChips(true), 600);
    }, 900);
  };

  return (
    <div className="psd-chat">
      {open && (
        <div className="psd-chat__panel">
          <div className="psd-chat__header">
            <div className="psd-chat__avatar">S</div>
            <div className="psd-chat__header-text">
              <h4>Sofia · Front desk</h4>
              <div className="psd-chat__header-meta">
                <span className="psd-chat__online-dot" /> Replies in ~2 min · EN · ES
              </div>
            </div>
            <button className="psd-chat__close" onClick={() => setOpen(false)} aria-label="Close chat">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div className="psd-chat__body" ref={bodyRef}>
            {messages.map((m, i) => (
              <div key={i} className={'psd-chat__msg psd-chat__msg--' + m.from}>{m.text}</div>
            ))}
            {typing && (
              <div className="psd-chat__typing"><span/><span/><span/></div>
            )}
          </div>
          {showChips && (
            <div className="psd-chat__chips">
              {CHAT_FLOW.map(c => (
                <button key={c.id} className="psd-chat__chip" onClick={() => handleChip(c)}>{c.label}</button>
              ))}
            </div>
          )}
          <div className="psd-chat__footer">Powered by Palm Springs Dental · Bilingual support</div>
        </div>
      )}
      <button className="psd-chat__bubble" onClick={() => setOpen(v => !v)} aria-label={open ? 'Close chat' : 'Open chat'}>
        {open ? (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        ) : (
          <>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            {hasUnread && <span className="psd-chat__badge">1</span>}
          </>
        )}
      </button>
    </div>
  );
}

const TOAST_EVENTS = [
  { initial: 'M', text: 'María R. just booked a cleaning',          when: '2 min ago' },
  { initial: 'J', text: 'Jorge L. checked Aetna coverage',          when: '7 min ago' },
  { initial: 'A', text: 'Ana M. booked an Invisalign consult',      when: '12 min ago' },
  { initial: 'C', text: 'Carlos D. requested an emergency visit',   when: '18 min ago' },
  { initial: 'L', text: 'Lucía P. left a 5-star Google review',     when: '24 min ago' },
];

function SocialToasts() {
  const [active, setActive] = useState(null);
  const [leaving, setLeaving] = useState(false);

  useEffect(() => {
    let cancelled = false;
    const timers = [];
    const cycle = (i) => {
      if (cancelled) return;
      setLeaving(false);
      setActive(TOAST_EVENTS[i % TOAST_EVENTS.length]);
      timers.push(setTimeout(() => {
        if (cancelled) return;
        setLeaving(true);
        timers.push(setTimeout(() => {
          if (cancelled) return;
          setActive(null);
          timers.push(setTimeout(() => cycle(i + 1), 7000));
        }, 320));
      }, 6000));
    };
    timers.push(setTimeout(() => cycle(0), 4500));
    return () => { cancelled = true; timers.forEach(clearTimeout); };
  }, []);

  if (!active) return null;
  return (
    <div className="psd-toast-stack">
      <div className={'psd-toast' + (leaving ? ' is-leaving' : '')}>
        <div className="psd-toast__avatar">{active.initial}</div>
        <div className="psd-toast__body">
          <p>{active.text}</p>
          <small>{active.when}</small>
        </div>
      </div>
    </div>
  );
}

function Nav() {

  const [menuOpen, setMenuOpen] = useState(false);
  const { openBooking } = useBooking();
  return (
    <header className="psd-nav">

          Palm Springs Mile · Hialeah, FL
        </span>
        <span className="psd-nav__util-meta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>

        </span>
        <div className="psd-nav__lang" role="group" aria-label="Language">
          <button onClick={() => setLang('EN')} className={lang==='EN'?'is-active':''}>EN</button>
          <span aria-hidden="true">|</span>
          <button onClick={() => setLang('ES')} className={lang==='ES'?'is-active':''}>ES</button>
        </div>
      </div>
      <div className="psd-nav__main">
        <button
          className={'psd-nav__hamburger' + (menuOpen ? ' is-open' : '')}
          onClick={() => setMenuOpen(v => !v)}
          aria-label={menuOpen ? 'Close menu' : 'Open menu'}
          aria-expanded={menuOpen}
        >
          <span /><span /><span />
        </button>
        <a className="psd-nav__logo" href="#">
          <img src="assets/logo-full.png" alt="Palm Springs Dental" />
        </a>
        <nav className="psd-nav__links">
          <a href="#">Services</a>
          <a href="#">New patients</a>

function ReviewCarousel() {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI(x => (x + 1) % REVIEWS.length), 7000);

  }, []);
  const r = REVIEWS[i];
  return (
    <section className="psd-section psd-reviews">
      <div className="psd-reviews__head">
        <span className="psd-eyebrow">From your neighbors</span>

      <div className="psd-reviews__dots" role="tablist">

          <button key={n} className={'psd-dot' + (n===i?' is-active':'')} onClick={() => setI(n)} aria-label={`Review ${n+1}`}/>

      </div>
    </section>
  );
}
