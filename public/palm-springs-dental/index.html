@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,30..100,0..1;1,9..144,300..700,30..100,0..1&family=Inter+Tight:wght@400;500;600;700&display=swap');

:root {

  --c-cream:       #FBFBFD;

  --accent-hover:  var(--c-teal-deep);
  --accent-wash:   var(--c-teal-wash);
  --border:        var(--c-grey-200);
  --border-strong: var(--c-grey-600);
  --f-display: 'Fraunces', 'Cormorant Garamond', Georgia, serif;
  --f-body:    'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --f-mono:    ui-monospace, 'SF Mono', 'JetBrains Mono', monospace;
  --type-display: 4.5rem;
  --type-h1:      3.5rem;
  --type-h2:      2.5rem;
  --type-h3:      1.75rem;
  --type-h4:      1.375rem;
  --type-lead:    1.25rem;
  --type-body:    1.0625rem;
  --type-small:   0.9375rem;
  --type-micro:   0.8125rem;
  --lh-display: 1.02;
  --lh-h1:      1.05;
  --lh-h2:      1.10;
  --lh-h3:      1.20;
  --lh-h4:      1.30;
  --lh-body:    1.60;
  --lh-tight:   1.40;
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-8:  48px;
  --s-10: 64px;
  --s-12: 96px;
  --s-16: 128px;
  --s-20: 192px;
  --r-sm:   6px;
  --r-md:   8px;
  --r-lg:   16px;
  --r-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(46, 46, 51, 0.06);
  --shadow-md: 0 8px 24px -8px rgba(46, 46, 51, 0.14);
  --shadow-lg: 0 24px 48px -12px rgba(46, 46, 51, 0.20);
  --shadow-cta: 0 1px 0 rgba(40, 168, 176, 0.30), 0 8px 24px -8px rgba(40, 168, 176, 0.45);
  --shadow-cta-hover: 0 1px 0 rgba(40, 168, 176, 0.40), 0 12px 32px -8px rgba(40, 168, 176, 0.55);
  --ease-out:    cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --d-fast:      160ms;
  --d-base:      240ms;
  --d-slow:      480ms;
  --d-page:      720ms;
  --max-w:       1280px;
  --max-read:    680px;
}

html { color-scheme: light; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--f-body);
  font-size: var(--type-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
h1, h2, h3, h4, h5 {
  font-family: var(--f-display);
  font-weight: 400;
  color: var(--fg-display);
  font-variation-settings: 'opsz' 144;
  letter-spacing: -0.02em;
  margin: 0;
  text-wrap: balance;
}
h1 { font-size: var(--type-h1); line-height: var(--lh-h1); }
h2 { font-size: var(--type-h2); line-height: var(--lh-h2); }
h3 { font-size: var(--type-h3); line-height: var(--lh-h3); font-weight: 500; letter-spacing: -0.01em; }
h4 { font-size: var(--type-h4); line-height: var(--lh-h4); font-weight: 500; letter-spacing: 0; }
.lead { font-size: var(--type-lead); line-height: 1.5; color: var(--fg-soft); }
p { margin: 0 0 1em; max-width: var(--max-read); text-wrap: pretty; }
small, .small { font-size: var(--type-small); }
.tnum, .price, .tel { font-variant-numeric: tabular-nums; }
a {
  color: var(--c-teal);
  text-decoration-color: var(--c-teal-soft);
  text-underline-offset: 4px;
  text-decoration-thickness: 1.5px;
  transition: color var(--d-fast) var(--ease-out);
}
a:hover { color: var(--c-teal-deep); }
::selection { background: var(--c-teal-soft); color: var(--c-grey-900); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

  <style>
* { box-sizing: border-box; }
html, body { margin:0; padding:0; overflow-x: hidden; }

.psd-eyebrow {

.psd-es {
  display: block;

  font-style: italic;
  color: var(--c-grey-600);
  font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
  font-size: 0.55em;

  letter-spacing: 0;

}
.psd-es--sm { font-size: 14px; margin-top: 4px; }

  border-radius: 999px;
  border: none;

  transition: all 240ms cubic-bezier(.2,.8,.2,1);
}
.psd-btn--primary {

}
.psd-btn--primary:hover {

}
.psd-btn--secondary {

  border: 1.5px solid var(--c-teal-deep);

}
.psd-btn--secondary:hover { background: var(--c-teal-deep); color: var(--c-cream); }
.psd-btn--ghost-light {

}
.psd-btn--ghost-light:hover { background: rgba(255,255,255,.1); border-color: var(--c-cream); }

.psd-link-arrow {
  font-family: var(--f-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--c-teal-deep);
  text-decoration: underline;
  text-decoration-color: var(--c-teal-light);

}
.psd-link-arrow::after { content: " \2192"; display: inline-block; transition: transform 200ms; }

.psd-link-arrow:hover { color: var(--c-teal); }
.psd-link-arrow--light { color: var(--c-cream); text-decoration-color: var(--c-teal-light); }
.psd-link-arrow--light:hover { color: var(--c-teal-light); }

.psd-photo {
  background:

  overflow: hidden;
  isolation: isolate;
}
.psd-photo::after {
  content: "";

  opacity: .5;

}
.psd-photo__placeholder {

.psd-nav__utility {

.psd-hero__headline-es {

.psd-hero__lead {

.psd-section {

}
.psd-section__head { margin-bottom: 48px; max-width: 720px; }
